    /* 1.  Using Objects for lookup. Use case lets say we have multiple key value pair, to evaluate different logic for each key that matches condition we can use switch , same we can achieve using looup */
    var paymentTypes = {
        "CC": "Credit Card",
        "DC": "Debit Card",
        "UPI": "UPI"
    };

    var selectedPaymentType = paymentTypes["CC"];
    console.log(selectedPaymentType);

    /* 2. Testing objects for properties */

    function checkPropInObj(propName) {
        if (paymentTypes.hasOwnProperty(propName)) {
            return paymentTypes[propName]
        } else {
            return "Prop not found"
        }
    }

    console.log(checkPropInObj("CD"));
